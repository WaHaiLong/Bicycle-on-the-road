<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的租约 - 骑行路上</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <span class="brand-icon">🚴</span>
        <span>骑行路上</span>
      </a>
      <div class="nav-links">
        <a href="index.html">浏览车辆</a>
        <a href="map.html">地图找车</a>
        <a href="my-rentals.html" id="nav-my-rentals">我的租约</a>
        <a href="list-bike.html" id="nav-list-bike" style="display:none">发布车辆</a>
        <a href="dashboard.html" id="nav-dashboard" style="display:none">车主仪表盘</a>
        <div id="nav-user">
          <span id="nav-username" class="nav-username"></span>
          <button class="btn btn-outline" onclick="signOut()">退出</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 2rem;">
    <h1>我的租约</h1>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all')">全部</button>
      <button class="tab-btn" onclick="switchTab('pending')">待确认</button>
      <button class="tab-btn" onclick="switchTab('confirmed')">已确认</button>
      <button class="tab-btn" onclick="switchTab('active')">骑行中</button>
      <button class="tab-btn" onclick="switchTab('completed')">已完成</button>
      <button class="tab-btn" onclick="switchTab('cancelled')">已取消</button>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>

    <div id="rentals-list"></div>

    <div id="empty-state" class="empty-state" style="display:none">
      <span>📋</span>
      <h3>暂无租约记录</h3>
      <p><a href="index.html">去浏览车辆</a></p>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 骑行路上. 让每一次骑行都成为冒险.</p>
    </div>
  </footer>

  <script type="module" src="supabase.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="my-rentals.js"></script>
</body>
</html>
