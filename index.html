<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>骑行路上 - 公路车出租平台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <span class="brand-icon">🚴</span>
        <span>骑行路上</span>
      </a>
      <div class="nav-links">
        <a href="index.html">浏览车辆</a>
        <a href="my-rentals.html" id="nav-my-rentals" style="display:none">我的租约</a>
        <a href="list-bike.html" id="nav-list-bike" style="display:none">发布车辆</a>
        <div id="nav-auth">
          <a href="login.html" class="btn btn-outline">登录</a>
          <a href="register.html" class="btn btn-primary">注册</a>
        </div>
        <div id="nav-user" style="display:none">
          <span id="nav-username" class="nav-username"></span>
          <button class="btn btn-outline" onclick="signOut()">退出</button>
        </div>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1>发现你的完美骑行伙伴</h1>
      <p>租赁专业公路车，开始你的骑行之旅</p>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜索城市、品牌或车型..." />
        <button class="btn btn-primary" onclick="searchBikes()">搜索</button>
      </div>
    </div>
  </section>

  <main class="container">
    <div class="filters">
      <div class="filter-group">
        <label>价格范围</label>
        <select id="filter-price" onchange="filterBikes()">
          <option value="">全部价格</option>
          <option value="0-100">¥100以下/天</option>
          <option value="100-200">¥100-200/天</option>
          <option value="200+">¥200以上/天</option>
        </select>
      </div>
      <div class="filter-group">
        <label>车架材质</label>
        <select id="filter-material" onchange="filterBikes()">
          <option value="">全部材质</option>
          <option value="碳纤维">碳纤维</option>
          <option value="铝合金">铝合金</option>
          <option value="钛合金">钛合金</option>
        </select>
      </div>
      <div class="filter-group">
        <label>尺寸</label>
        <select id="filter-size" onchange="filterBikes()">
          <option value="">全部尺寸</option>
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
        </select>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>

    <div id="bikes-grid" class="bikes-grid"></div>

    <div id="empty-state" class="empty-state" style="display:none">
      <span>🚲</span>
      <h3>暂无符合条件的车辆</h3>
      <p>试试调整筛选条件</p>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 骑行路上. 让每一次骑行都成为冒险.</p>
    </div>
  </footer>

  <script type="module" src="supabase.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="bikes.js"></script>
</body>
</html>
